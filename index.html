<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NRGjust4U - Δωρεάν μελέτη λογαριασμού</title>
  <meta name="description" content="NRGjust4U Energy Advisors - Δωρεάν προσωποποιημένη μελέτη λογαριασμού ρεύματος ή/και φυσικού αερίου." />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef8ff 0%, #ffffff 55%, #eef8ff 100%);
      color: #12366f;
      text-align: center;
    }
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 22px 14px 34px;
    }
    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 35px rgba(16, 65, 120, 0.16);
      border: 1px solid rgba(0, 119, 204, 0.12);
    }
    .flyer {
      display: block;
      width: 100%;
      max-width: 900px;
      height: auto;
      margin: 0 auto;
      border-radius: 14px;
    }
    .button {
      display: inline-block;
      margin: 22px auto 4px;
      padding: 14px 24px;
      border-radius: 10px;
      background: #0074d9;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 5px 18px rgba(0, 116, 217, 0.25);
    }
    .note {
      margin: 14px 0 0;
      font-size: 14px;
      color: #355b8f;
    }
    @media (max-width: 600px) {
      .page { padding: 10px 8px 22px; }
      .card { padding: 7px; border-radius: 12px; }
      .flyer { border-radius: 10px; }
      .button { width: 100%; font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <img class="flyer" src="NRGjust4U_Welcome.png" alt="NRGjust4U - Δωρεάν μελέτη λογαριασμού" />
    </section>

    <a class="button" href="NRGjust4U_Welcome.pdf" target="_blank" rel="noopener">
      Άνοιγμα / κατέβασμα σε PDF
    </a>
    <p class="note">NRGjust4U Energy Advisors - Η σωστή επιλογή ενέργειας για εσένα</p>
  </main>
</body>
</html>
